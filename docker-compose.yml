# ============================================
# Nova Reminders - Docker Compose
# Development & Production configuration
# ============================================

services:
  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nova-reminders-app
    ports:
      - "3001:3000"  # Expose to all interfaces
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:./db/nova.db
      - JWT_SECRET=${JWT_SECRET}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_SUBJECT=${VAPID_SUBJECT}
      - CRON_SECRET=${CRON_SECRET}
      - REDIS_URL=redis://redis:6379
    volumes:
      - nova-db:/app/db
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nova-network

  # Redis for session/queue/rate-limiting
  redis:
    image: redis:7-alpine
    container_name: nova-reminders-redis
    # No ports exposed - only accessible within docker network
    volumes:
      - nova-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - nova-network

  # Nginx Reverse Proxy (disabled - using host nginx instead)
  # Uncomment if you want to run nginx in container
  # nginx:
  #   image: nginx:alpine
  #   container_name: nova-reminders-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - app
  #   restart: unless-stopped
  #   networks:
  #     - nova-network

volumes:
  nova-db:
    driver: local
  nova-redis:
    driver: local

networks:
  nova-network:
    driver: bridge
