# ============================================
# Nova Reminders - Docker Compose Production
# Override for production with MySQL
# ============================================

services:
  app:
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mysql://${MYSQL_USER:-nova_user}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-nova_reminders}
      - JWT_SECRET=${JWT_SECRET}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_SUBJECT=${VAPID_SUBJECT}
      - CRON_SECRET=${CRON_SECRET}
      - REDIS_URL=redis://redis:6379
    ports:
      - "3005:3000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # MySQL Database (Production)
  mysql:
    image: mysql:8.0
    container_name: nova-reminders-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-nova-remindersroot}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-nova_reminders}
      MYSQL_USER: ${MYSQL_USER:-nova_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-nova-reminders321}
    # Expose port for external access (development/migration only)
    ports:
      - "3312:3306"
    volumes:
      - nova-mysql:/var/lib/mysql
      - ./sql/migrations.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    networks:
      - nova-network

volumes:
  nova-mysql:
    external: true
