<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Push Notification Subscription</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #0a0b14;
            color: #f0f2ff;
        }
        .section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        h1 {
            color: #7c5cfc;
            margin-bottom: 30px;
        }
        h2 {
            color: #00d4ff;
            margin-top: 0;
        }
        button {
            background: linear-gradient(135deg, #7c5cfc, #6b4fe0);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            margin: 5px;
            transition: all 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(124, 92, 252, 0.4);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .status {
            padding: 10px;
            border-radius: 6px;
            margin: 10px 0;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
        .success {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            color: #00d4ff;
        }
        .error {
            background: rgba(255, 82, 82, 0.1);
            border: 1px solid rgba(255, 82, 82, 0.3);
            color: #ff5252;
        }
        .warning {
            background: rgba(255, 193, 7, 0.1);
            border: 1px solid rgba(255, 193, 7, 0.3);
            color: #ffc107;
        }
        .info {
            background: rgba(124, 92, 252, 0.1);
            border: 1px solid rgba(124, 92, 252, 0.3);
            color: #7c5cfc;
        }
        pre {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 12px;
        }
        .log {
            max-height: 300px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }
        .log-entry {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #7c5cfc;
            padding-left: 10px;
        }
    </style>
</head>
<body>
    <h1>🔍 Debug Push Notification Subscription</h1>

    <div class="section">
        <h2>1. Browser Support Check</h2>
        <div id="support-status"></div>
    </div>

    <div class="section">
        <h2>2. Permission Status</h2>
        <div id="permission-status"></div>
        <button onclick="requestPermission()">Request Permission</button>
    </div>

    <div class="section">
        <h2>3. Service Worker</h2>
        <div id="sw-status"></div>
        <button onclick="registerServiceWorker()">Register Service Worker</button>
    </div>

    <div class="section">
        <h2>4. Push Subscription</h2>
        <div id="subscription-status"></div>
        <button onclick="subscribeToPush()">Subscribe to Push</button>
        <button onclick="checkSubscription()">Check Current Subscription</button>
    </div>

    <div class="section">
        <h2>5. Auth Status</h2>
        <div id="auth-status"></div>
        <button onclick="checkAuth()">Check Auth</button>
    </div>

    <div class="section">
        <h2>6. Test Push</h2>
        <button onclick="testPush()">Send Test Push</button>
    </div>

    <div class="section">
        <h2>📋 Debug Log</h2>
        <div id="log" class="log"></div>
        <button onclick="clearLog()">Clear Log</button>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000';
        
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.style.borderLeftColor = type === 'error' ? '#ff5252' : type === 'success' ? '#00d4ff' : '#7c5cfc';
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }

        function showStatus(elementId, message, type) {
            const el = document.getElementById(elementId);
            el.innerHTML = `<div class="status ${type}">${message}</div>`;
        }

        // 1. Check browser support
        function checkSupport() {
            const supported = 'Notification' in window && 
                            'serviceWorker' in navigator && 
                            'PushManager' in window;
            
            if (supported) {
                showStatus('support-status', '✅ Browser supports push notifications', 'success');
                log('✅ Browser supports push notifications', 'success');
            } else {
                showStatus('support-status', '❌ Browser does not support push notifications', 'error');
                log('❌ Browser does not support push notifications', 'error');
            }
            
            return supported;
        }

        // 2. Check permission
        function checkPermission() {
            const permission = Notification.permission;
            const statusMap = {
                'granted': { msg: '✅ Permission granted', type: 'success' },
                'denied': { msg: '❌ Permission denied', type: 'error' },
                'default': { msg: '⚠️ Permission not requested yet', type: 'warning' }
            };
            
            const status = statusMap[permission];
            showStatus('permission-status', status.msg, status.type);
            log(`Permission status: ${permission}`, status.type === 'success' ? 'success' : 'info');
            
            return permission;
        }

        async function requestPermission() {
            log('Requesting notification permission...');
            try {
                const result = await Notification.requestPermission();
                log(`Permission result: ${result}`, result === 'granted' ? 'success' : 'error');
                checkPermission();
                
                if (result === 'granted') {
                    log('✅ Permission granted! Now subscribing to push...', 'success');
                    await subscribeToPush();
                }
            } catch (error) {
                log(`❌ Error requesting permission: ${error.message}`, 'error');
                showStatus('permission-status', `❌ Error: ${error.message}`, 'error');
            }
        }

        // 3. Service Worker
        async function registerServiceWorker() {
            log('Registering service worker...');
            try {
                const registration = await navigator.serviceWorker.register('/sw.js');
                log('✅ Service worker registered', 'success');
                showStatus('sw-status', `✅ Service worker registered (scope: ${registration.scope})`, 'success');
                return registration;
            } catch (error) {
                log(`❌ Service worker registration failed: ${error.message}`, 'error');
                showStatus('sw-status', `❌ Error: ${error.message}`, 'error');
                throw error;
            }
        }

        async function checkServiceWorker() {
            if ('serviceWorker' in navigator) {
                const registration = await navigator.serviceWorker.getRegistration();
                if (registration) {
                    showStatus('sw-status', `✅ Service worker active (scope: ${registration.scope})`, 'success');
                    log('✅ Service worker is active', 'success');
                } else {
                    showStatus('sw-status', '⚠️ Service worker not registered', 'warning');
                    log('⚠️ Service worker not registered', 'info');
                }
            }
        }

        // 4. Push Subscription
        async function subscribeToPush() {
            log('Starting push subscription...');
            
            try {
                // Check permission
                if (Notification.permission !== 'granted') {
                    throw new Error('Permission not granted. Please allow notifications first.');
                }
                
                // Get service worker
                log('Getting service worker registration...');
                const registration = await navigator.serviceWorker.ready;
                log('✅ Service worker ready', 'success');
                
                // Get VAPID key
                log('Fetching VAPID public key...');
                const vapidResponse = await fetch(`${API_BASE}/api/push/vapid-public-key`);
                if (!vapidResponse.ok) {
                    throw new Error(`Failed to get VAPID key: ${vapidResponse.status}`);
                }
                const { publicKey } = await vapidResponse.json();
                log(`✅ Got VAPID key: ${publicKey.substring(0, 20)}...`, 'success');
                
                // Subscribe
                log('Subscribing to push manager...');
                const subscription = await registration.pushManager.subscribe({
                    userVisibleOnly: true,
                    applicationServerKey: urlBase64ToUint8Array(publicKey)
                });
                log('✅ Push manager subscription created', 'success');
                
                // Send to server
                log('Sending subscription to server...');
                const subscribeResponse = await fetch(`${API_BASE}/api/push/subscribe`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify(subscription.toJSON())
                });
                
                if (!subscribeResponse.ok) {
                    const errorData = await subscribeResponse.json();
                    throw new Error(`Server error: ${errorData.error || subscribeResponse.status}`);
                }
                
                const result = await subscribeResponse.json();
                log(`✅ Subscription saved to server! ID: ${result.subscriptionId}`, 'success');
                showStatus('subscription-status', `✅ Successfully subscribed! ID: ${result.subscriptionId}`, 'success');
                
                return subscription;
            } catch (error) {
                log(`❌ Subscription error: ${error.message}`, 'error');
                showStatus('subscription-status', `❌ Error: ${error.message}`, 'error');
                throw error;
            }
        }

        async function checkSubscription() {
            log('Checking current subscription...');
            try {
                const registration = await navigator.serviceWorker.ready;
                const subscription = await registration.pushManager.getSubscription();
                
                if (subscription) {
                    log('✅ Active subscription found', 'success');
                    showStatus('subscription-status', 
                        `✅ Active subscription<br><pre>${JSON.stringify(subscription.toJSON(), null, 2)}</pre>`, 
                        'success');
                } else {
                    log('⚠️ No active subscription', 'info');
                    showStatus('subscription-status', '⚠️ No active subscription', 'warning');
                }
            } catch (error) {
                log(`❌ Error checking subscription: ${error.message}`, 'error');
                showStatus('subscription-status', `❌ Error: ${error.message}`, 'error');
            }
        }

        // 5. Auth Check
        async function checkAuth() {
            log('Checking authentication...');
            try {
                const response = await fetch(`${API_BASE}/api/auth/me`, {
                    credentials: 'include'
                });
                
                if (response.ok) {
                    const user = await response.json();
                    log(`✅ Authenticated as: ${user.name} (${user.email})`, 'success');
                    showStatus('auth-status', 
                        `✅ Authenticated<br>Name: ${user.name}<br>Email: ${user.email}`, 
                        'success');
                } else {
                    log('❌ Not authenticated', 'error');
                    showStatus('auth-status', '❌ Not authenticated. Please login first.', 'error');
                }
            } catch (error) {
                log(`❌ Auth check error: ${error.message}`, 'error');
                showStatus('auth-status', `❌ Error: ${error.message}`, 'error');
            }
        }

        // 6. Test Push
        async function testPush() {
            log('Sending test push notification...');
            try {
                const response = await fetch(`${API_BASE}/api/push/test`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ message: 'Test from debug page!' })
                });
                
                if (response.ok) {
                    const result = await response.json();
                    log(`✅ Test push sent! Sent: ${result.sent}, Failed: ${result.failed}`, 'success');
                    alert('✅ Test push sent! Check your notifications.');
                } else {
                    const error = await response.json();
                    throw new Error(error.error || 'Failed to send test push');
                }
            } catch (error) {
                log(`❌ Test push error: ${error.message}`, 'error');
                alert(`❌ Error: ${error.message}`);
            }
        }

        // Helper function
        function urlBase64ToUint8Array(base64String) {
            const padding = '='.repeat((4 - (base64String.length % 4)) % 4);
            const base64 = (base64String + padding)
                .replace(/\-/g, '+')
                .replace(/_/g, '/');
            
            const rawData = window.atob(base64);
            const outputArray = new Uint8Array(rawData.length);
            
            for (let i = 0; i < rawData.length; ++i) {
                outputArray[i] = rawData.charCodeAt(i);
            }
            return outputArray;
        }

        // Initialize on load
        window.addEventListener('load', () => {
            log('🚀 Debug page loaded');
            checkSupport();
            checkPermission();
            checkServiceWorker();
            checkAuth();
        });
    </script>
</body>
</html>
